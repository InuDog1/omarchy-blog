name: Auto Publish Reddit Blog Post

on:
  schedule:
    # Run daily at 00:00 UTC (09:00 JST)
    - cron: '0 0 * * *'
  workflow_dispatch: # Allows manual triggering from the Actions tab

# Set permissions for GITHUB_TOKEN to allow committing and pushing changes
permissions:
  contents: write

jobs:
  auto-post:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Fetch all history so git push works correctly
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip' # Enable caching for pip dependencies

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run blog generation pipeline
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OUTPUT_DIR: 'src/content/blog'
          HOURS_WINDOW: '24'
        run: |
          python main.py

      - name: Commit and push new post
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Stage any new markdown files in the blog directory
          git add src/content/blog/
          
          # Check if there are changes staged for commit
          if git diff --cached --quiet; then
            echo "No new posts generated today."
          else
            echo "New post detected. Committing and pushing..."
            git commit -m "chore: auto-publish new blog post from Reddit RSS"
            # Push changes to the current branch
            git push origin HEAD:main
          fi
